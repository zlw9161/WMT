# Nginx location config for serving WMT at:
#   https://www.mls-home.com:3000/wmt
#
# Usage:
# 1) Build frontend: npm run build
# 2) Upload dist/* to: /var/www/wmt/
# 3) Include these location blocks inside the existing server block that listens on 3000.
#
# This config only handles /wmt and /wmt/*, so it does not affect other paths on :3000.
# It also does not change services running on :1311.

location = /wmt {
    return 301 /wmt/;
}

location /wmt/ {
    alias /var/www/wmt/;
    index index.html;
    try_files $uri $uri/ /wmt/index.html;

    # Optional cache policy for built static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
